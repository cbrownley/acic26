name: causal_env

channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11

  # Core scientific stack (conda handles compiled binaries better)
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11
  - scikit-learn=1.3
  - statsmodels
  - joblib

  # ML libraries
  - lightgbm
  - xgboost
  - catboost

  # Visualization
  - matplotlib
  - seaborn
  - plotly
  - tqdm

  # Data utilities
  - pyarrow
  - openpyxl

  # Notebook environment
  - jupyterlab
  - notebook
  - ipykernel
  - nb_conda_kernels

  # Dev tools
  - black
  - isort
  - flake8
  - pylint

  # Performance utilities
  - numba
  - dask

  # Required for pip installs
  - pip

  - pip:
      # Core causal inference libraries
      - econml
      - dowhy
      - causalml

      # Helpful utilities
      - graphviz
      - shap
      - optuna

