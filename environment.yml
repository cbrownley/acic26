name: acic_env

channels:
  - conda-forge

dependencies:

  # Python
  - python=3.11

  # Core stack
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11
  - scikit-learn=1.3
  - statsmodels=0.14
  - patsy
  - tabulate

  # ML
  - lightgbm=4
  - xgboost=2
  - catboost=1.2
  - flaml
  - shap

  # Visualization
  - matplotlib=3.8
  - seaborn
  - plotly
  - tqdm

  # Data
  - pyarrow
  - openpyxl
  - xlrd

  # Graph / DAG tools
  - graphviz
  - python-graphviz
  - pydot
  - networkx

  # Performance
  - numba=0.58
  - dask
  - joblib

  # Notebooks
  - jupyterlab
  - notebook
  - ipykernel
  - nb_conda_kernels

  # Dev tools
  - black
  - isort
  - flake8
  - pylint
  - pre-commit

  # Misc utilities
  - sympy
  - pip

  # Pip packages
  - pip:
      - econml
      - doubleml
      - fklearn
      - arviz
      - bambi
      - pymc